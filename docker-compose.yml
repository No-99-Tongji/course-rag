services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-course_rag}
      MYSQL_USER: ${APP_MYSQL_USER:-course_rag}
      MYSQL_PASSWORD: ${APP_MYSQL_PASSWORD:-course_rag}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-course_rag_root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-course_rag_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  course-rag:
    build: .
    ports:
      - "9000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+aiomysql://${APP_MYSQL_USER:-course_rag}:${APP_MYSQL_PASSWORD:-course_rag}@mysql:3306/${MYSQL_DATABASE:-course_rag}
    volumes:
      - rag_index:/app/data/index
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
  rag_index:
