<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>课程 RAG 助手</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 0; background: #f7f7fb; color: #202124; }
      main { max-width: 960px; margin: 0 auto; padding: 32px 20px; }
      h1 { margin-bottom: 8px; }
      .subtitle { color: #5f6368; margin-bottom: 24px; }
      textarea { width: 100%; box-sizing: border-box; min-height: 96px; padding: 14px; border: 1px solid #d0d4dc; border-radius: 12px; font-size: 16px; resize: vertical; }
      button { margin-top: 12px; padding: 10px 18px; border: 0; border-radius: 10px; background: #1a73e8; color: white; font-size: 15px; cursor: pointer; }
      button:disabled { background: #9bbcf0; cursor: not-allowed; }
      .card { background: white; border: 1px solid #e3e5ea; border-radius: 14px; padding: 18px; margin-top: 18px; box-shadow: 0 1px 4px rgba(60,64,67,.08); }
      .answer { white-space: pre-wrap; line-height: 1.7; }
      .source h3 { margin: 0 0 8px; font-size: 16px; }
      .meta { color: #5f6368; font-size: 13px; margin-bottom: 8px; }
      .content { white-space: pre-wrap; line-height: 1.55; max-height: 220px; overflow: auto; background: #fafafa; padding: 10px; border-radius: 8px; }
      .examples button { background: #eef3fe; color: #185abc; margin-right: 8px; margin-bottom: 8px; }
    </style>
  </head>
  <body>
    <main>
      <h1>课程 RAG 助手</h1>
      <div class="subtitle">基于课程视频转录、PPT 解析文本和规范文件检索回答。</div>
      <div class="examples">
        <button type="button" onclick="setQuestion('软件工程经济学是什么？')">软件工程经济学是什么？</button>
        <button type="button" onclick="setQuestion('如何进行软件成本估算？')">如何进行软件成本估算？</button>
        <button type="button" onclick="setQuestion('净现值法适合回答什么决策问题？')">净现值法</button>
      </div>
      <textarea id="question" placeholder="输入你的课程问题..."></textarea>
      <button id="ask" onclick="ask()">提问</button>
      <section id="answer" class="card" style="display:none"></section>
      <section id="sources"></section>
    </main>
    <script>
      function setQuestion(text) {
        document.getElementById('question').value = text;
      }

      async function ask() {
        const question = document.getElementById('question').value.trim();
        if (!question) return;
        const button = document.getElementById('ask');
        const answer = document.getElementById('answer');
        const sources = document.getElementById('sources');
        button.disabled = true;
        answer.style.display = 'block';
        answer.className = 'card answer';
        answer.textContent = '检索中...';
        sources.innerHTML = '';
        try {
          const res = await fetch('/api/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question, top_k: 6 })
          });
          if (!res.ok) throw new Error(await res.text());
          const data = await res.json();
          answer.textContent = data.answer;
          sources.innerHTML = data.sources.map((s, i) => `
            <article class="card source">
              <h3>资料 ${i + 1}: ${escapeHtml(s.title)}</h3>
              <div class="meta">来源：${escapeHtml(s.source)} ${s.lesson ? ' | 章节：' + escapeHtml(s.lesson) : ''} ${s.topic ? ' | 主题：' + escapeHtml(s.topic) : ''} | 分数：${s.score.toFixed(3)}</div>
              <div class="content">${escapeHtml(s.content)}</div>
            </article>
          `).join('');
        } catch (error) {
          answer.textContent = '请求失败：' + error.message;
        } finally {
          button.disabled = false;
        }
      }

      function escapeHtml(text) {
        return String(text || '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
      }
    </script>
  </body>
</html>
